name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies (strict, from lockfile)
        run: npm ci

      - name: Run TypeScript check
        run: npm run lint

      - name: Run unit tests (Vitest, no server needed)
        run: npx vitest run tests/unit

      - name: Start dev server
        run: npm run dev &
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Wait for server to be ready
        run: |
          for i in {1..30}; do
            if curl -sf http://localhost:3000/api/profile > /dev/null; then
              echo "Server ready"
              exit 0
            fi
            sleep 2
          done
          echo "Server failed to start"
          exit 1

      - name: Run integration tests (Vitest, needs server)
        run: npx vitest run tests/integration

      - name: Run benchmark
        run: npm run benchmark

      - name: Run human-perspective E2E test
        run: node tests/human-perspective-test.mjs
